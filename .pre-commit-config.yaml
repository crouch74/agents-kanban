repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.7
    hooks:
      - id: ruff-check
        name: ruff-check (CI-aligned targets)
        args:
          - --select
          - F401
          - apps/api
          - packages/core/src
          - packages/mcp-server/src
          - tests
      - id: ruff-format
        name: ruff-format (check)
        args: ["--check"]
        files: ^(apps/api|packages/core/src|packages/mcp-server/src|tests)/

  - repo: local
    hooks:
      - id: web-tsc-noemit
        name: web-tsc-noemit (CI-aligned lightweight TS check)
        entry: npm --workspace @acp/web run lint
        language: system
        pass_filenames: false
        files: ^(apps/web/src/|apps/web/tsconfig.*\.json|packages/sdk/src/)
