name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify (Python + Web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Bootstrap dependencies
        run: bash scripts/bootstrap.sh --with-browser-deps

      - name: Run verification
        run: bash scripts/verify.sh --skip-bootstrap

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

  pr-screenshot-evidence:
    name: PR Screenshot Evidence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start web server
        run: npm run dev:web -- --host 127.0.0.1 --port 5173 --strictPort > /tmp/pr-screenshots-web.log 2>&1 &

      - name: Wait for web server
        run: |
          for attempt in {1..60}; do
            if curl --silent --show-error --fail http://127.0.0.1:5173 >/dev/null; then
              echo "Web server is reachable."
              exit 0
            fi
            sleep 1
          done
          echo "Web server failed to start in time."
          cat /tmp/pr-screenshots-web.log
          exit 1

      - name: Capture screenshots
        run: node scripts/capture_pr_screenshots.mjs

      - name: Upload PR screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: .artifacts/pr-screenshots/
          if-no-files-found: error

      - name: Upsert PR evidence comment
        uses: actions/github-script@v7
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_REPOSITORY: ${{ github.repository }}
        with:
          script: |
            const marker = '<!-- pr-screenshot-evidence -->';
            const bodyLines = [
              marker,
              '## 📸 PR Screenshot Evidence',
              '',
              'Automated desktop screenshots are attached as the `pr-screenshots` artifact for this workflow run.',
              '',
              '- [Download screenshots artifact](' +
                'https://github.com/' + process.env.WORKFLOW_REPOSITORY +
                '/actions/runs/' + process.env.WORKFLOW_RUN_ID +
                ')',
              '',
              'Generated views:',
              '- `?section=home` → `dashboard-home.png`',
              '- `?section=projects` → `project-board-tasks.png`',
              '- `?section=activity` → `activity-stream.png`',
            ];
            const body = bodyLines.join('\n');
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info('Updated existing PR screenshot evidence comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
              core.info('Created new PR screenshot evidence comment.');
            }
