name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify in Docker (Python + Web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI container
        run: docker build -f Dockerfile.ci -t acp-ci .

      - name: Bootstrap dependencies (container)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            acp-ci \
            bash -lc "bash scripts/bootstrap.sh"

      - name: Run verification (container)
        run: |
          docker run --rm \
            -e ACP_SKIP_PLAYWRIGHT_INSTALL=1 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            acp-ci \
            bash -lc "bash scripts/verify.sh --skip-bootstrap"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: test-results/**/design-*.png
          if-no-files-found: warn
