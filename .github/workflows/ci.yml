name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pr-screenshot-evidence:
    name: PR Screenshot Evidence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate screenshot comments on PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const imageMarkdownRe = /!\[[^\]]*\]\([^)]+\)/g;
            const ghAttachmentRe = /https:\/\/github\.com\/user-attachments\/assets\/[^\s)]+/g;
            const legacyAttachmentRe = /https:\/\/user-images\.githubusercontent\.com\/[^\s)]+/g;

            let imageCount = 0;
            for (const comment of comments) {
              const body = comment.body || "";
              imageCount += (body.match(imageMarkdownRe) || []).length;
              imageCount += (body.match(ghAttachmentRe) || []).length;
              imageCount += (body.match(legacyAttachmentRe) || []).length;
            }

            if (imageCount < 2) {
              core.setFailed(
                `Expected at least 2 screenshots in PR comments, found ${imageCount}. ` +
                `Please add a PR comment with multiple screenshots before merging.`
              );
            } else {
              core.info(`✅ Found ${imageCount} screenshot references in PR comments.`);
            }

  verify:
    name: Verify (Python + Web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Bootstrap dependencies
        run: bash scripts/bootstrap.sh --with-browser-deps

      - name: Run verification
        run: bash scripts/verify.sh --skip-bootstrap

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
