name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/ci.yml'
      - 'apps/web/**'
      - 'packages/sdk/**'
      - 'scripts/capture_pr_screenshots.mjs'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main

permissions: {}

jobs:
  python-import-lint:
    name: Python Import Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r apps/api/requirements-dev.txt

      - name: Run Python import lint
        run: bash scripts/lint_python.sh

  verify:
    name: Verify (Python + Web)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm

      - name: Bootstrap dependencies
        run: bash scripts/bootstrap.sh --with-browser-deps

      - name: Run verification
        run: bash scripts/verify.sh --skip-bootstrap

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload web coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-coverage
          path: coverage/web/
          if-no-files-found: warn

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

  pr-screenshot-evidence:
    name: PR Screenshot Evidence
    # Restrict execution to trusted PR contexts only:
    # - run only for same-repository PRs (not forks)
    # - run only for PRs targeting main (enforced in trigger above as well)
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Required writes:
    # - contents:write -> create/update preview images under ci/pr-screenshot-previews
    #   at .artifacts/pr-screenshot-previews/pr-<number>/*.png
    # - pull-requests:write -> create/update the PR evidence comment
    # No other repository data is mutated by this job.
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start web server
        run: npm --workspace @acp/web run dev -- --host 127.0.0.1 --port 5173 --strictPort > /tmp/pr-screenshots-web.log 2>&1 &

      - name: Wait for web server
        run: |
          for attempt in {1..60}; do
            if curl --silent --show-error --fail http://127.0.0.1:5173 >/dev/null; then
              echo "Web server is reachable."
              exit 0
            fi
            sleep 1
          done
          echo "Web server failed to start in time."
          cat /tmp/pr-screenshots-web.log
          exit 1

      - name: Capture screenshots
        run: node scripts/capture_pr_screenshots.mjs

      - name: Upload PR screenshots artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-screenshots
          path: .artifacts/pr-screenshots/
          if-no-files-found: error

      - name: Publish screenshot previews and upsert PR evidence comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_REPOSITORY: ${{ github.repository }}
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const marker = '<!-- pr-screenshot-evidence -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const prNumber = String(context.payload.pull_request.number);
            const previewBranch = 'ci/pr-screenshot-previews';
            const previewRoot = '.artifacts/pr-screenshot-previews';
            const screenshots = [
              { local: '.artifacts/pr-screenshots/dashboard-home.png', remote: `pr-${prNumber}/dashboard-home.png`, label: 'Home' },
              { local: '.artifacts/pr-screenshots/project-board-tasks.png', remote: `pr-${prNumber}/project-board-tasks.png`, label: 'Projects' },
              { local: '.artifacts/pr-screenshots/activity-stream.png', remote: `pr-${prNumber}/activity-stream.png`, label: 'Activity' },
            ];

            const defaultBranch = context.payload.repository.default_branch;
            const defaultRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` });
            const baseSha = defaultRef.data.object.sha;

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${previewBranch}`,
                sha: baseSha,
              });
              core.info(`Created preview branch ${previewBranch}.`);
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }
              core.info(`Preview branch ${previewBranch} already exists.`);
            }

            const imageLines = [];
            for (const screenshot of screenshots) {
              const targetPath = path.posix.join(previewRoot, screenshot.remote);
              const content = fs.readFileSync(screenshot.local).toString('base64');

              let sha;
              try {
                const existing = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: targetPath,
                  ref: previewBranch,
                });
                if (!Array.isArray(existing.data)) {
                  sha = existing.data.sha;
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path: targetPath,
                branch: previewBranch,
                message: `chore(ci): update PR screenshot preview for #${prNumber}`,
                content,
                sha,
              });

              const rawUrl = `https://raw.githubusercontent.com/${process.env.WORKFLOW_REPOSITORY}/${previewBranch}/${targetPath}`;
              imageLines.push(`### ${screenshot.label}`);
              imageLines.push(`![${screenshot.label} screenshot](${rawUrl})`);
              imageLines.push('');
            }

            const bodyLines = [
              marker,
              '## 📸 PR Screenshot Evidence',
              '',
              'Automated desktop screenshots (inline previews below) are published by CI for this PR.',
              '',
              ...imageLines,
              '- [Workflow run artifacts](' +
                'https://github.com/' + process.env.WORKFLOW_REPOSITORY +
                '/actions/runs/' + process.env.WORKFLOW_RUN_ID +
                ')',
            ];
            const body = bodyLines.join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              core.info('Updated existing PR screenshot evidence comment.');
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
              core.info('Created new PR screenshot evidence comment.');
            }
