name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/dependabot.yml'
      - '.github/workflows/**'
      - '.github/security/**'
      - 'apps/web/**'
      - 'apps/api/pyproject.toml'
      - 'apps/api/requirements*.txt'
      - 'packages/core/pyproject.toml'
      - 'packages/mcp-server/pyproject.toml'
      - 'packages/sdk/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main

permissions: {}

jobs:
  quick-checks:
    name: Quick Lint + Type Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r apps/api/requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run Python import lint
        run: bash scripts/lint_python.sh

      - name: Run web type checks
        run: npm run lint:web

  python-tests:
    name: Python Integration Tests
    runs-on: ubuntu-latest
    needs: quick-checks
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r apps/api/requirements-dev.txt

      - name: Run integration tests
        run: bash scripts/test_integration.sh

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  web-unit-build:
    name: Web Unit Tests + Build
    runs-on: ubuntu-latest
    needs: quick-checks
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Run web unit tests
        run: npm --workspace @acp/web run test

      - name: Build web app
        run: npm --workspace @acp/web run build

      - name: Upload web coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-coverage
          path: coverage/web/
          if-no-files-found: warn

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs:
      - quick-checks
      - web-unit-build
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

  pr-screenshot-evidence:
    name: PR Screenshot Evidence
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - quick-checks
      - web-unit-build
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start web server
        run: npm --workspace @acp/web run dev -- --host 127.0.0.1 --port 5173 --strictPort > /tmp/pr-screenshots-web.log 2>&1 &

      - name: Wait for web server
        run: |
          for attempt in {1..60}; do
            if curl --silent --show-error --fail http://127.0.0.1:5173 >/dev/null; then
              echo "Web server is reachable."
              exit 0
            fi
            sleep 1
          done
          echo "Web server failed to start in time."
          cat /tmp/pr-screenshots-web.log
          exit 1

      - name: Capture screenshots
        run: node scripts/capture_pr_screenshots.mjs

      - name: Upload PR screenshots artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-screenshots
          path: .artifacts/pr-screenshots/
          if-no-files-found: error

      - name: Publish screenshot previews and upsert PR evidence comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_REPOSITORY: ${{ github.repository }}
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const marker = '<!-- pr-screenshot-evidence -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const prNumber = String(context.payload.pull_request.number);
            const previewBranch = 'ci/pr-screenshot-previews';
            const previewRoot = '.artifacts/pr-screenshot-previews';
            const screenshots = [
              { local: '.artifacts/pr-screenshots/dashboard-home.png', remote: `pr-${prNumber}/dashboard-home.png`, label: 'Home' },
              { local: '.artifacts/pr-screenshots/project-board-tasks.png', remote: `pr-${prNumber}/project-board-tasks.png`, label: 'Projects' },
              { local: '.artifacts/pr-screenshots/activity-stream.png', remote: `pr-${prNumber}/activity-stream.png`, label: 'Activity' },
            ];

            const defaultBranch = context.payload.repository.default_branch;
            const defaultRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` });
            const baseSha = defaultRef.data.object.sha;

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${previewBranch}`,
                sha: baseSha,
              });
              core.info(`Created preview branch ${previewBranch}.`);
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }
              core.info(`Preview branch ${previewBranch} already exists.`);
            }

            const imageLines = [];
            for (const screenshot of screenshots) {
              const targetPath = path.posix.join(previewRoot, screenshot.remote);
              const content = fs.readFileSync(screenshot.local).toString('base64');

              let sha;
              try {
                const existing = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: targetPath,
                  ref: previewBranch,
                });
                if (!Array.isArray(existing.data)) {
                  sha = existing.data.sha;
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path: targetPath,
                branch: previewBranch,
                message: `chore(ci): update PR screenshot preview for #${prNumber}`,
                content,
                sha,
              });

              const rawUrl = `https://raw.githubusercontent.com/${process.env.WORKFLOW_REPOSITORY}/${previewBranch}/${targetPath}`;
              imageLines.push(`### ${screenshot.label}`);
              imageLines.push(`![${screenshot.label} screenshot](${rawUrl})`);
              imageLines.push('');
            }

            const bodyLines = [
              marker,
              '## 📸 PR Screenshot Evidence',
              '',
              'Automated desktop screenshots (inline previews below) are published by CI for this PR.',
              '',
              ...imageLines,
              '- [Workflow run artifacts](' +
                'https://github.com/' + process.env.WORKFLOW_REPOSITORY +
                '/actions/runs/' + process.env.WORKFLOW_RUN_ID +
                ')',
            ];
            const body = bodyLines.join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              core.info('Updated existing PR screenshot evidence comment.');
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
              core.info('Created new PR screenshot evidence comment.');
            }
