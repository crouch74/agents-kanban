name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pr-screenshot-evidence:
    name: PR Screenshot Evidence Capture
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots from web app
        run: |
          npm --workspace @acp/web run dev -- --host 127.0.0.1 --port 5173 >/tmp/acp-web.log 2>&1 &
          WEB_PID=$!
          trap 'kill $WEB_PID || true' EXIT

          for i in {1..45}; do
            if curl -sf http://127.0.0.1:5173 >/dev/null; then
              break
            fi
            sleep 1
          done

          node scripts/capture_pr_screenshots.mjs

      - name: Upload screenshot artifact
        id: upload_screenshots
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: .artifacts/pr-screenshots/
          if-no-files-found: error

      - name: Publish screenshot comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const runId = process.env.GITHUB_RUN_ID;
            const artifactId = "${{ steps.upload_screenshots.outputs.artifact-id }}";

            const marker = "<!-- pr-screenshot-evidence -->";
            const body = `${marker}
            ### 📸 Automated UI screenshots (desktop)

            The pipeline captured screenshots from three application views:

            - Dashboard view (`home`)
            - Project board/tasks view (`projects`)
            - Activity view (`activity`)

            Download the screenshot bundle: https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifactId}
            `;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(
              (comment) =>
                comment.user?.type === "Bot" &&
                typeof comment.body === "string" &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  verify:
    name: Verify (Python + Web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Bootstrap dependencies
        run: bash scripts/bootstrap.sh --with-browser-deps

      - name: Run verification
        run: bash scripts/verify.sh --skip-bootstrap

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
