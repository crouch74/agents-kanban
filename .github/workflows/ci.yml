name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pr-screenshot-evidence:
    name: PR Screenshot Evidence (3 views)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate screenshot comments on PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const imageMarkdownRe = /!\[[^\]]*\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g;
            const ghAttachmentRe = /https:\/\/github\.com\/user-attachments\/assets\/[^\s)]+/g;
            const legacyAttachmentRe = /https:\/\/user-images\.githubusercontent\.com\/[^\s)]+/g;
            const viewRe =
              /\b(project|projects|task|tasks|board|boards|dashboard|dashboards|session|sessions|diagnostics|activity|waiting|worktree|worktrees|repository|repositories|search)\b/gi;

            const screenshotRefs = new Set();
            const viewSet = new Set();
            for (const comment of comments) {
              const body = comment.body || "";
              let commentImageCount = 0;

              for (const match of body.matchAll(imageMarkdownRe)) {
                screenshotRefs.add(match[1]);
                commentImageCount += 1;
              }
              for (const match of body.match(ghAttachmentRe) || []) {
                screenshotRefs.add(match);
                commentImageCount += 1;
              }
              for (const match of body.match(legacyAttachmentRe) || []) {
                screenshotRefs.add(match);
                commentImageCount += 1;
              }

              if (commentImageCount > 0) {
                for (const viewMatch of body.matchAll(viewRe)) {
                  const rawView = viewMatch[1].toLowerCase();
                  const normalizedView = rawView.endsWith("s")
                    ? rawView.slice(0, -1)
                    : rawView;
                  viewSet.add(normalizedView);
                }
              }
            }

            if (screenshotRefs.size < 3 || viewSet.size < 3) {
              core.setFailed(
                `Expected at least 3 screenshots from 3 different app views in PR comments. ` +
                `Found ${screenshotRefs.size} screenshot reference(s) and ${viewSet.size} distinct view label(s): ` +
                `[${Array.from(viewSet).sort().join(", ")}]. ` +
                `Please add/update a PR comment with at least 3 screenshots and identify each view ` +
                `(e.g., project, task, dashboard).`
              );
            } else {
              core.info(
                `✅ Found ${screenshotRefs.size} screenshot references across ` +
                `${viewSet.size} distinct views: [${Array.from(viewSet).sort().join(", ")}].`
              );
            }

  verify:
    name: Verify (Python + Web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Bootstrap dependencies
        run: bash scripts/bootstrap.sh --with-browser-deps

      - name: Run verification
        run: bash scripts/verify.sh --skip-bootstrap

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
