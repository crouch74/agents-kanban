name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dependency-audit:
    name: Dependency Audit (Python + Node)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies for audits
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Run pip-audit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/security

          mapfile -t PIP_AUDIT_IGNORES < <(
            awk 'NF && $1 !~ /^#/' .github/security/pip-audit-ignore.txt | awk '{print $1}'
          )

          ignore_args=()
          for vuln_id in "${PIP_AUDIT_IGNORES[@]:-}"; do
            ignore_args+=(--ignore-vuln "$vuln_id")
          done

          pip-audit \
            -r apps/api/requirements-dev.txt \
            --format json \
            "${ignore_args[@]}" \
            | tee .artifacts/security/pip-audit.json

      - name: Run npm audit (high/critical gate)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/security

          npm audit --workspaces --json > .artifacts/security/npm-audit.json || true

          node <<'NODE'
          const fs = require('node:fs');

          const allowlistPath = '.github/security/npm-audit-allowlist.txt';
          const reportPath = '.artifacts/security/npm-audit.json';

          const allowlist = new Set(
            fs
              .readFileSync(allowlistPath, 'utf8')
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter((line) => line && !line.startsWith('#'))
              .map((line) => line.split(/\s+/)[0])
          );

          const data = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          const blocked = [];

          const vulnerabilities = data.vulnerabilities || {};
          for (const [pkgName, vuln] of Object.entries(vulnerabilities)) {
            const severity = String(vuln.severity || '').toLowerCase();
            if (!['high', 'critical'].includes(severity)) continue;

            const viaEntries = Array.isArray(vuln.via) ? vuln.via : [vuln.via];
            const advisoryIds = new Set();

            for (const via of viaEntries) {
              if (!via || typeof via === 'string') continue;
              if (via.source) advisoryIds.add(String(via.source));
              if (via.url) {
                const last = String(via.url).split('/').pop();
                if (last) advisoryIds.add(last);
              }
            }

            const isAllowed = [...advisoryIds].some((id) => allowlist.has(id));
            if (!isAllowed) {
              blocked.push({
                package: pkgName,
                severity,
                advisory_ids: [...advisoryIds],
                title: vuln.title || '',
              });
            }
          }

          fs.writeFileSync(
            '.artifacts/security/npm-audit-high-critical.json',
            JSON.stringify({ blocked }, null, 2)
          );

          if (blocked.length > 0) {
            console.error(`Found ${blocked.length} non-allowlisted high/critical npm vulnerabilities.`);
            process.exit(1);
          }

          console.log('No non-allowlisted high/critical npm vulnerabilities found.');
          NODE

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: .artifacts/security/
          if-no-files-found: error
