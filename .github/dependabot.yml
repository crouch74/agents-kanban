version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "npm"
      - "automerge-candidate"
    reviewers:
      - "ahmedaeid"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      npm-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:15"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "python"
      - "automerge-candidate"
    reviewers:
      - "ahmedaeid"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      pip-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      pip-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "pip"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "python"
      - "automerge-candidate"
    reviewers:
      - "ahmedaeid"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      pip-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      pip-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "pip"
    directory: "/packages/mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:45"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "python"
      - "automerge-candidate"
    reviewers:
      - "ahmedaeid"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      pip-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      pip-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"
      - "automerge-candidate"
    reviewers:
      - "ahmedaeid"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions-all:
        patterns:
          - "*"
