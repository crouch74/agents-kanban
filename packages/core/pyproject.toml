[build-system]
requires = ["setuptools>=82.0.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "acp-core"
version = "0.1.0"
description = "Shared domain and services for Agent Control Plane."
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.11,<3",
  "pydantic-settings>=2.13.1,<3",
  "sqlalchemy>=2.0.41,<2.1",
  "structlog>=25.5.0,<26"
]

[tool.setuptools.packages.find]
where = ["src"]

