[build-system]
requires = ["setuptools>=82.0.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "acp-mcp-server"
version = "0.1.0"
description = "MCP surface for Agent Control Plane."
requires-python = ">=3.12"
dependencies = [
  "acp-core",
  "mcp>=1.27.0,<2"
]

[tool.setuptools.packages.find]
where = ["src"]

